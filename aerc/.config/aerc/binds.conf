[view] #{{{
<C-i> = :toggle-key-passthrough<Enter> # toggle key passthrough
<C-n> = :next<Enter> # open next mail
<C-p> = :prev<Enter> # open previous mail
dd = :move<space>"Trash"<Enter> # For Google accounts: delete mail under cursor by moving it to the trash folder
ea = :reply -a<Enter> # edit a reply to all recipients
ef = :forward<Enter> # edit a forward mail like f
eF = :forward -a<Enter> # edit a forward mail to all recipients
er = :reply -q<Enter> # edit a reply with quoted original mail
eR = :reply -aq<Enter> # edit a reply to sender and all CC with quoted original mail
eQ = :reply -a -q<Enter> # edit a reply to all senders with quoted mail
eq = :reply -q<Enter> # edit a reply to all senders with quoted mail
ee = :reply <Enter> # edit a reply to the sender
eF = :forward -a<Enter> # edit a forward mail to all recipients
ef = :forward<Enter> # edit a forward mail
gx = :open-link <space> # open link under cursor
<C-j> = :next-part<Enter> # Switch to next part of a multipart email.
<C-k> = :prev-part<Enter> # Switch to previous part of a multipart email.
pA = :read<Enter>:archive flat<Enter>
pa = :archive flat<Enter> # move (think put or paste) mail in the archive folder
pi = :move<space>INBOX<Enter> # mov mail into INBOX
pt = :move<space>Trash<Enter> # mov mail into INBOX
pj = :move<space>"Junk Mail"<Enter> # mov mail into INBOX
dd = :move<space>"Trash"<Enter> # For Google accounts: delete mail under cursor by moving it to the trash folder
#pb = :move<space> Brain<Enter> # move mail in my Brain.
pf = :move<space> # move (think put or paste) mail in folder. Next character filters folders.
q = :close<Enter> # quit the current view
th = :toggle-headers<Enter> # toggle headers
w = :save<space> # write mail to file [name].
| = :pipe<space>
# end [view]}}}

[view::passthrough] #{{{
$noinherit = true
$ex = <C-x>
<Esc> = :toggle-key-passthrough<Enter>
<C-i> = :toggle-key-passthrough<Enter> # toggle key passthrough
# end [view::passthrough]}}}

[compose] # Keybindings used when the embedded terminal is not selected in the compose view {{{
$ex = <C-x>
$noinherit = true
$complete = <C-o> # default keybind that is missing from aerc-vim
<C-j> = :next-field<Enter>
<C-k> = :prev-field<Enter>
<backtab> = :prev-field<Enter>
<tab> = :next-field<Enter>
\[t = :prev-tab<Enter>
\]t = :next-tab<Enter>
\[a = :switch-account -p<Enter>
\]a = :switch-account -n<Enter>
# end [compose]}}}

[compose::editor] # Keybindings used when the embedded terminal is selected in the compose view {{{
$noinherit = true
$ex = <C-x>
<C-k> = :prev-field<Enter>
<C-j> = :next-field<Enter>
\[t = :prev-tab<Enter>
\]t = :next-tab<Enter>
# end [compose::editor]}}}

[compose::review] # Keybindings used when reviewing a mail to be sent {{{
# Inline comments are used as descriptions on the review screen
w = :send<Enter> # send
q = :choose -o d discard abort -o p postpone postpone<Enter> # Abort or postpone
e = :edit<Enter> # Edit body
E = :edit -e<Enter> # Edit headers
v = :preview<Enter>
aa = :attach<space> # attachment - attach
ad = :detach<space> # attachment - detach
cf = :header -f From<space> # overwrite who the email is from
S = :sign<Enter> # Toggle signing
x = :encrypt<Enter> # Toggle encryption to all recipients
# end [compose::review]}}}

[terminal] #{{{
$noinherit = true
$ex = <C-x>
\[t = :prev-tab<Enter>
\]t = :next-tab<Enter>
# end [terminal]}}}

